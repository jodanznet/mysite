<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JODANZ.NET</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* 画像全体を覆うコンテナ */
        .wrapper { position: relative; width: 100vw; height: 100vh; background: url('web.jpg') no-repeat center center; background-size: contain; }

        /* リンク用ボタンの透明エリア */
        .hotspot { position: absolute; cursor: pointer; border: 1px solid transparent; }
        
        /* 拡声器 (Listen) */
        .listen { top: 40%; left: 10%; width: 25%; height: 30%; }
        /* カメラ (Gallery) */
        .gallery { top: 55%; left: 15%; width: 10%; height: 15%; }
        /* 新聞 (Blog) */
        .blog { top: 75%; left: 15%; width: 10%; height: 20%; }

        /* 耳のギミックエリア */
        .ear-gimmick { position: absolute; top: 20%; left: 60%; width: 20%; height: 50%; cursor: help; }
        .ear-gimmick::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px; border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; opacity: 0; pointer-events: none;
        }
        .ear-gimmick:hover::after { animation: ripple 1.5s ease-out infinite; }
        
        @keyframes ripple {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(10); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="https://your-podcast-url.com" class="hotspot listen"></a>
        <a href="gallery.html" class="hotspot gallery"></a>
        <a href="blog.html" class="hotspot blog"></a>
        
        <div class="ear-gimmick"></div>
    </div>

</body>
</html>
