<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JODANZ.NET</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; }
        
        .wrapper { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background-image: url('images/web.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
        }

        /* リンク用エリア（調整用枠線を表示します。配置が決まったら border: 0 にしてください） */
        .hotspot { position: absolute; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        
        /* 拡声器(Listen) */
        .listen { top: 40%; left: 15%; width: 10%; height: 20%; }
        /* カメラ(Gallery) */
        .gallery { top: 60%; left: 20%; width: 8%; height: 10%; }
        /* 新聞(Blog) */
        .blog { top: 75%; left: 20%; width: 12%; height: 15%; }

        /* 耳のギミック */
        .ear-gimmick { position: absolute; top: 20%; left: 60%; width: 20%; height: 50%; cursor: help; }
        
        /* 波紋の発生位置：前回より左下に調整 */
        .ear-gimmick::after {
            content: ''; position: absolute; 
            top: 65%; left: 35%; 
            width: 50px; height: 50px; 
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; opacity: 0; pointer-events: none;
        }
        
        .ear-gimmick:hover::after { animation: ripple 1.5s ease-out infinite; }
        
        @keyframes ripple {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(10); }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <a href="https://podcast-url.com" class="hotspot listen"></a>
        <a href="gallery.html" class="hotspot gallery"></a>
        <a href="blog.html" class="hotspot blog"></a>
        
        <div class="ear-gimmick"></div>
    </div>
</body>
</html>
