<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JODANZ.NET</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; }
        
        /* 画像がない場合に備えて、背景が見えるようにする */
        .wrapper { 
            width: 100vw; height: 100vh; 
            background: url('web.jpg') no-repeat center center; 
            background-size: contain; 
            border: 5px solid red; /* 画像が表示されない場合、赤い枠で囲って存在を確認 */
        }
        
        .debug-text { color: red; font-size: 20px; text-align: center; padding-top: 50px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="debug-text">画像が表示されなければ、web.jpgファイルが同じフォルダにあるか確認してください</div>
        <a href="https://your-podcast-url.com" style="position:absolute; top:40%; left:10%; width:25%; height:30%; border:1px solid yellow;"></a>
    </div>

</body>
</html>
