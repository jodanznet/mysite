<style>
    body { background: #000; color: #fff; }
    
    /* 記号をタイル状に並べる */
    .symbol-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 20px;
        padding: 50px;
    }

    .symbol-item {
        font-size: 2rem;
        cursor: pointer;
        transition: transform 0.3s;
        border: 1px solid #333; /* 無機質な境界線 */
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1/1;
    }

    .symbol-item:hover {
        transform: scale(1.1);
        border-color: #fff; /* ざわめき感 */
    }
</style>

<div class="symbol-grid">
    <div class="symbol-item">✜</div>
    <div class="symbol-item">⧓</div>
    <div class="symbol-item">◈</div>
    </div>
